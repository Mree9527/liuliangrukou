name: Auto Deploy & Publish to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: |
          cd money-engine && npm install --production 2>/dev/null || true
          pip install praw requests 2>/dev/null || echo "pip done"
      
      - name: Generate content
        run: |
          cd money-engine/src
          node distribute.js 2>&1 | tail -3 || true
          python3 publish_live.py --live 2>&1 | tail -5 || true
      
      - name: Deploy to gh-pages
        run: |
          git config user.name "Money Engine Bot"
          git config user.email "bot@moneymachine.com"
          git checkout origin/main -- money-engine/output/ 2>/dev/null || true
          cp -r money-engine/output/* . 2>/dev/null || true
          echo "" > .nojekyll
          mkdir -p pending-posts
          cp -r money-engine/output/pending-posts/* pending-posts/ 2>/dev/null || true
          git add -A
          git commit -m "deploy: automated $(date +%Y-%m-%d)" --allow-empty 2>/dev/null || true
          git push origin gh-pages --force 2>/dev/null || echo "push done"
      
      - name: Verify
        run: sleep 15 && curl -s -o /dev/null -w "%{http_code}" https://mree9527.github.io/liuliangrukou/ || true
